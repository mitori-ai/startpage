<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StartPage</title>
    <link rel="stylesheet" href="css/design-tokens.css">
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html { min-height: 100%; }

      body {
        min-height: 100vh;
        font-family: var(--font-sans);
        background:
          radial-gradient(circle at 88% 18%, rgba(192, 57, 43, 0.12), transparent 24%),
          linear-gradient(180deg, rgba(247, 247, 245, 0.96) 0%, rgba(255, 255, 255, 1) 50%, rgba(247, 247, 245, 1) 100%);
        color: var(--text-body);
        position: relative;
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(26, 26, 24, 0.06) 1px, transparent 1px),
          linear-gradient(90deg, rgba(26, 26, 24, 0.06) 1px, transparent 1px);
        background-size: 72px 72px;
        mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.28), transparent 92%);
        opacity: 0.5;
      }

      a { color: inherit; text-decoration: none; }
      button, input { font: inherit; }

      .page-shell {
        position: relative;
        z-index: 1;
        max-width: 1440px;
        margin: 0 auto;
        padding: 28px 24px 48px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 20px;
      }

      .topbar-title {
        font-family: var(--font-serif);
        font-size: clamp(2rem, 4vw, 3.2rem);
        line-height: 1.05;
        letter-spacing: -0.03em;
        color: var(--text-strong);
        flex-shrink: 0;
      }

      .topbar-title-accent { color: var(--accent); }
      .topbar-subtitle {
        font-size: 0.88rem;
        color: var(--text-muted);
        margin-top: 4px;
        font-weight: 400;
      }

      .search-wrapper {
        width: 280px;
        flex-shrink: 0;
        position: relative;
      }

      .search {
        width: 100%;
        padding: 1rem 1.1rem 1rem 3rem;
        border-radius: 18px;
        border: 1px solid var(--border);
        background: linear-gradient(180deg, rgba(255, 255, 255, 1), rgba(247, 247, 245, 0.9));
        color: var(--text-strong);
        outline: none;
        transition: border-color var(--transition), box-shadow var(--transition), transform var(--transition);
        box-shadow: var(--shadow-inset);
      }
      .search::placeholder { color: var(--text-muted); }
      .search:focus {
        border-color: rgba(192, 57, 43, 0.35);
        box-shadow: 0 0 0 4px rgba(192, 57, 43, 0.08);
        transform: translateY(-1px);
      }

      .search-icon-right {
        position: absolute;
        right: 18px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--accent);
        font-size: 1rem;
        pointer-events: none;
      }

      .main { margin-top: 0; }

      .section-heading { margin-bottom: 14px; }
      .section-heading h2 {
        font-family: var(--font-serif);
        font-size: clamp(1.4rem, 2vw, 1.8rem);
        line-height: 1.15;
        letter-spacing: -0.02em;
        color: var(--text-strong);
        font-weight: 400;
      }

      .grid {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .category {
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-width: 0;
        padding: 16px;
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        background: rgba(255, 255, 255, 0.92);
        box-shadow: var(--shadow-card);
        transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
      }
      .category:hover {
        transform: translateY(-4px);
        border-color: rgba(192, 57, 43, 0.24);
        box-shadow: var(--shadow-hover);
      }
      .category[data-span="2"] { grid-column: span 2; }

      .category-topline {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .category-index, .category-count, .link-host {
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .category-index { color: rgba(26, 26, 24, 0.2); }
      .category-count {
        padding: 0.38rem 0.72rem;
        background: var(--accent-soft);
        color: var(--accent);
        border-radius: var(--radius-pill);
      }

      .category-header h3 {
        font-family: var(--font-serif);
        font-size: 1.7rem;
        line-height: 1.05;
        letter-spacing: -0.03em;
        color: var(--text-strong);
      }
      .category-header p {
        margin-top: 7px;
        color: var(--text-muted);
        line-height: 1.55;
      }

      .links { display: flex; flex-direction: column; gap: 10px; }

      .link-card {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
        padding: 12px 14px;
        border: 1px solid transparent;
        border-radius: var(--radius-md);
        background: linear-gradient(180deg, rgba(247, 247, 245, 0.76), rgba(255, 255, 255, 0.96));
        transition: transform var(--transition), border-color var(--transition), background var(--transition), box-shadow var(--transition);
      }
      .link-card:hover {
        transform: translateX(3px);
        border-color: rgba(192, 57, 43, 0.16);
        background: linear-gradient(180deg, rgba(253, 236, 234, 0.72), rgba(255, 255, 255, 1));
        box-shadow: 0 16px 34px -28px rgba(26, 26, 24, 0.25);
      }

      .link-icon {
        width: 44px;
        height: 44px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 16px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 1.15rem;
      }

      .link-info { flex: 1; min-width: 0; }
      .link-title {
        color: var(--text-strong);
        font-weight: 600;
        font-size: 0.96rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .link-desc {
        margin-top: 3px;
        color: var(--text-muted);
        font-size: 0.84rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .link-meta {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 8px;
        flex-shrink: 0;
      }
      .link-host {
        padding: 0.32rem 0.62rem;
        background: rgba(26, 26, 24, 0.05);
        color: var(--text-muted);
      }

      .link-arrow {
        color: var(--accent);
        font-size: 1rem;
        transform: translateX(-3px);
        opacity: 0;
        transition: transform var(--transition), opacity var(--transition);
      }
      .link-card:hover .link-arrow {
        transform: translateX(0);
        opacity: 1;
      }

      .empty-state {
        display: none;
        margin-top: 18px;
        padding: 42px 24px;
        text-align: center;
        border: 1px dashed var(--border-strong);
        border-radius: var(--radius-lg);
        background: rgba(255, 255, 255, 0.72);
      }
      .empty-state h3 {
        font-family: var(--font-serif);
        font-size: 2rem;
        color: var(--text-strong);
      }
      .empty-state p {
        margin-top: 10px;
        color: var(--text-muted);
      }

      .footer {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        gap: 12px 24px;
        margin-top: 28px;
        padding: 24px 4px 0;
        border-top: 1px solid rgba(221, 221, 216, 0.9);
        color: var(--text-muted);
        font-size: 0.82rem;
      }
      .footer strong { color: var(--text-body); }

      @media (max-width: 1180px) {
        .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .category[data-span="2"] { grid-column: span 2; }
      }

      @media (max-width: 780px) {
        .page-shell { padding: 18px 14px 34px; }
        .section-heading { align-items: flex-start; }
        .grid { grid-template-columns: 1fr; }
        .category[data-span="2"] { grid-column: span 1; }
        .category, .empty-state { border-radius: 22px; }
      }

      @media (max-width: 560px) {
        .topbar { flex-direction: column; align-items: flex-start; }
        .search-wrapper { width: 100%; }
        .link-card { align-items: flex-start; }
        .link-meta { align-items: flex-start; }
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <div class="topbar">
        <div>
          <h1 class="topbar-title" id="pageTitle">Start<span class="topbar-title-accent">Page</span></h1>
          <p class="topbar-subtitle" id="pageSubtitle"></p>
        </div>
        <div class="search-wrapper">
          <input type="text" class="search" id="search" placeholder="search links, tools, categories...">
          <span class="search-icon-right">⌕</span>
        </div>
      </div>

      <main class="main">
        <div class="section-heading">
          <h2>Everything that matters, one hop away.</h2>
        </div>
        <div class="grid" id="grid"></div>
        <div class="empty-state" id="empty">
          <h3>No results found</h3>
          <p>Try a different search term to bring your decision surface back into focus.</p>
        </div>
      </main>

      <footer class="footer">
        <p><strong id="footerTitle">StartPage</strong> &mdash; <span id="year"></span></p>
        <p>Design tokens adapted from mitori.ai's live homepage palette and type hierarchy.</p>
      </footer>
    </div>

    <script>
      const DATA_URL = 'data/links.json';
      const searchEl = document.getElementById('search');
      const emptyState = document.getElementById('empty');
      const gridEl = document.getElementById('grid');
      const pageTitleEl = document.getElementById('pageTitle');
      const pageSubtitleEl = document.getElementById('pageSubtitle');
      const footerTitleEl = document.getElementById('footerTitle');
      let searchTimeout;

      function getDomain(url) {
        try { return new URL(url).hostname.replace(/^www\./, ''); }
        catch { return 'external'; }
      }

      function updateHeader(global = {}) {
        const title = global.title || 'StartPage';
        const subtitle = global.subtitle || 'Operational Hub';
        const titleMarkup = title.endsWith('Page')
          ? `${title.slice(0, -4)}<span class="topbar-title-accent">Page</span>`
          : title;
        document.title = title;
        pageTitleEl.innerHTML = titleMarkup;
        pageSubtitleEl.textContent = subtitle;
        footerTitleEl.textContent = title;
      }

      function render(categories) {
        gridEl.innerHTML = '';
        categories.forEach((category, index) => {
          const card = document.createElement('article');
          card.className = 'category';
          card.dataset.id = category.id;
          if (category.col_span) card.dataset.span = category.col_span;
          const linksHTML = category.links.map((link) => `
            <a href="${link.url}" target="_blank" rel="noopener" class="link-card"
               data-search="${[category.title, category.description, link.title, link.description, getDomain(link.url)].filter(Boolean).join(' ')}">
              <div class="link-icon">${link.icon || '\u2197'}</div>
              <div class="link-info">
                <div class="link-title">${link.title}</div>
                <div class="link-desc">${link.description || 'External link'}</div>
              </div>
              <div class="link-meta">
                <span class="link-host">${getDomain(link.url)}</span>
                <span class="link-arrow" aria-hidden="true">\u2192</span>
              </div>
            </a>`).join('');
          card.innerHTML = `
            <div class="category-topline">
              <span class="category-index">${String(index + 1).padStart(2, '0')}</span>
              <span class="category-count">${category.links.length} links</span>
            </div>
            <div class="category-header">
              <h3>${category.title}</h3>
              <p>${category.description || 'Curated navigation surface'}</p>
            </div>
            <div class="links">${linksHTML}</div>`;
          gridEl.appendChild(card);
        });
      }

      function applySearch(query) {
        const cards = [...document.querySelectorAll('.category')];
        let visibleLinks = 0;
        cards.forEach((card) => {
          const links = [...card.querySelectorAll('.link-card')];
          let count = 0;
          links.forEach((link) => {
            const haystack = link.dataset.search.toLowerCase();
            const isMatch = !query || haystack.includes(query);
            link.style.display = isMatch ? 'flex' : 'none';
            if (isMatch) count++;
          });
          card.style.display = count > 0 ? 'flex' : 'none';
          visibleLinks += count;
        });
        emptyState.style.display = visibleLinks > 0 ? 'none' : 'block';
      }

      searchEl.addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => applySearch(e.target.value.trim().toLowerCase()), 80);
      });

      document.getElementById('year').textContent = new Date().getFullYear();

      fetch(DATA_URL)
        .then(res => res.json())
        .then(data => {
          updateHeader(data.global || {});
          render(data.categories || []);
          applySearch('');
        })
        .catch(() => { render([]); applySearch(''); });
    </script>
  </body>
</html>
