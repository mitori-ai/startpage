<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StartPage</title>
    <link rel="stylesheet" href="css/design-tokens.css">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: var(--font);
        background: var(--bg);
        color: var(--text-primary);
        min-height: 100vh;
        padding: 0;
      }

      .header {
        padding: 40px 48px 24px;
        max-width: 1400px;
        margin: 0 auto;
      }

      .greeting {
        font-size: 14px;
        color: var(--text-secondary);
        margin-bottom: 8px;
        font-weight: 500;
        letter-spacing: 0.3px;
      }

      .title {
        font-size: 42px;
        font-weight: 700;
        background: var(--gradient-text);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 4px;
      }

      .subtitle {
        font-size: 16px;
        color: var(--text-secondary);
        font-weight: 400;
      }

      .search-container {
        padding: 20px 48px;
        max-width: 1400px;
        margin: 0 auto;
      }

      .search {
        width: 100%;
        padding: 12px 16px 12px 40px;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        background: var(--bg-search);
        color: var(--text-primary);
        font-size: 14px;
        outline: none;
        transition: border-color var(--transition);
      }

      .search::placeholder {
        color: var(--text-secondary);
      }

      .search:focus {
        border-color: var(--accent-blue);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
      }

      .search-wrapper {
        position: relative;
      }

      .search-icon {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-secondary);
        font-size: 16px;
      }

      .time {
        font-size: 13px;
        color: var(--text-secondary);
        margin-left: 8px;
      }

      .main {
        padding: 0 48px 48px;
        max-width: 1400px;
        margin: 0 auto;
      }

      .grid {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(4, minmax(250px, 1fr));
      }

      .category {
        background: var(--bg-card);
        border-radius: var(--radius);
        border: 1px solid var(--border);
        padding: 20px;
        transition: border-color var(--transition), background var(--transition);
      }

      .category:hover {
        border-color: var(--border-hover);
      }

      .category[data-span="2"] {
        grid-column: span 2;
      }

      .category-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 1px solid var(--border);
      }

      .category-title {
        font-size: 15px;
        font-weight: 600;
        color: var(--text-primary);
      }

      .category-count {
        font-size: 11px;
        color: var(--text-secondary);
        background: rgba(255,255,255,0.05);
        padding: 2px 8px;
        border-radius: 99px;
        font-weight: 500;
      }

      .links {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .link-card {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 12px;
        border-radius: var(--radius-sm);
        text-decoration: none;
        color: var(--text-link);
        transition: background var(--transition), color var(--transition);
      }

      .link-card:hover {
        background: var(--bg-glow);
        color: var(--accent-blue);
      }

      .link-icon {
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(255,255,255,0.04);
        border-radius: 8px;
        font-size: 16px;
        flex-shrink: 0;
      }

      .link-info {
        flex: 1;
        min-width: 0;
      }

      .link-title {
        font-size: 13px;
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .link-desc {
        font-size: 11px;
        color: var(--text-secondary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .link-arrow {
        color: var(--text-secondary);
        opacity: 0;
        transform: translateX(-4px);
        transition: all var(--transition);
        font-size: 13px;
      }

      .link-card:hover .link-arrow {
        opacity: 1;
        transform: translateX(0);
      }

      .empty-state {
        text-align: center;
        padding: 64px 0;
        color: var(--text-secondary);
        display: none;
      }

      .empty-state h3 {
        font-size: 18px;
        font-weight: 500;
        margin-bottom: 8px;
        color: var(--text-primary);
      }

      .footer {
        text-align: center;
        padding: 24px;
        color: var(--text-secondary);
        font-size: 12px;
      }

      @media (max-width: 1024px) {
        .grid {
          grid-template-columns: repeat(2, minmax(250px, 1fr));
        }
        .category[data-span="2"] {
          grid-column: span 2;
        }
      }

      @media (max-width: 640px) {
        .grid {
          grid-template-columns: 1fr;
        }
        .category[data-span="2"] {
          grid-column: span 1;
        }
        .header, .search-container, .main {
          padding-left: 20px;
          padding-right: 20px;
        }
        .title {
          font-size: 28px;
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="greeting" id="greeting"></div>
      <h1 class="title">StartPage</h1>
      <p class="subtitle">Operational Hub</p>
    </div>

    <div class="search-container">
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" class="search" id="search" placeholder="Search links...">
      </div>
    </div>

    <div class="main">
      <div class="grid" id="grid"></div>
      <div class="empty-state" id="empty">
        <h3>No results found</h3>
        <p>Try a different search term</p>
      </div>
    </div>

    <div class="footer">
      <p>StartPage — <span id="year"></span></p>
    </div>

    <script>
      const DATA_URL = 'data/links.json';

      function getGreeting() {
        const h = new Date().getHours();
        if (h < 12) return 'Good morning';
        if (h < 17) return 'Good afternoon';
        return 'Good evening';
      }

      function formatClock() {
        const d = new Date();
        const hh = d.getHours() % 12 || 12;
        const m = d.getMinutes().toString().padStart(2, '0');
        const ampm = d.getHours() >= 12 ? 'PM' : 'AM';
        return `${hh}:${m} ${ampm}`;
      }

      function render(categories) {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';

        categories.forEach(cat => {
          const card = document.createElement('div');
          card.className = 'category';
          card.dataset.id = cat.id;
          if (cat.col_span) card.dataset.span = cat.col_span;

          const linksHTML = cat.links.map(l => `
            <a href="${l.url}" target="_blank" rel="noopener" class="link-card" data-search="${l.title} ${l.description}">
              <div class="link-icon">${l.icon}</div>
              <div class="link-info">
                <div class="link-title">${l.title}</div>
                <div class="link-desc">${l.description}</div>
              </div>
              <span class="link-arrow">→</span>
            </a>
          `).join('');

          card.innerHTML = `
            <div class="category-header">
              <span class="category-title">${cat.title}</span>
              <span class="category-count">${cat.links.length}</span>
            </div>
            <div class="links">${linksHTML}</div>
          `;

          grid.appendChild(card);
        });
      }

      let searchTimeout;
      const searchEl = document.getElementById('search');
      const emptyState = document.getElementById('empty');

      searchEl.addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
          const query = e.target.value.trim().toLowerCase();
          const cards = document.querySelectorAll('.category');
          let anyVisible = false;

          cards.forEach(card => {
            const links = card.querySelectorAll('.link-card');
            let visibleCount = 0;

            links.forEach(link => {
              const data = link.dataset.search.toLowerCase();
              const match = !query || data.includes(query);
              link.style.display = match ? 'flex' : 'none';
              if (match) visibleCount++;
            });

            card.style.display = visibleCount > 0 ? 'block' : 'none';
            if (visibleCount > 0) anyVisible = true;
          });

          emptyState.style.display = anyVisible ? 'none' : 'block';
        }, 100);
      });

      // Initialize
      document.getElementById('greeting').textContent = `${getGreeting()} — ${formatClock()}`;
      document.getElementById('year').textContent = new Date().getFullYear();

      setInterval(() => {
        document.getElementById('greeting').textContent = `${getGreeting()} — ${formatClock()}`;
      }, 1000);

      fetch(DATA_URL)
        .then(res => res.json())
        .then(data => render(data.categories));
    </script>
  </body>
</html>
